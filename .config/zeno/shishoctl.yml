snippets:
  - keyword: shisho
    snippet: shishoctl

completions:
  - name: shishoctl subcommands
    patterns:
      - "^shishoctl $"
    sourceCommand: "shishoctl --help 2>/dev/null | perl -ne 'print \"$1\\n\" if /^\\s{4}(\\S+)/' | grep -v '^-'"
    options:
      --prompt: "'shishoctl> '"

  - name: shishoctl workflow subcommands
