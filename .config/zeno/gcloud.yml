snippets:
  - keyword: gc
    snippet: gcloud
    patterns:
      - '^gcloud\b'

  - keyword: c
    snippet: config
    context:
      lbuffer: '^gcloud\s'

  - keyword: u
    snippet: unset
    context:
      lbuffer: '^gcloud config\s'

  - keyword: gcua
    snippet: gcloud config unset account

  - keyword: gcsa
    snippet: gcloud config set account

  - keyword: adc
    snippet: gcloud auth application-default print-access-token | xargs -I{} curl -s "https://oauth2.googleapis.com/tokeninfo?access_token={}" | jq -r '.email'

  - keyword: gcloud-config
    snippet: nvim ~/.config/gcloud/configurations/

  - keyword: ga;
    snippet: gcloud auth application-default login --impersonate-service-account {{SERVICE_ACCOUNT_EMAIL}}

  - keyword: gcl;
    snippet: gcloud config configurations list

  - keyword: gao;
    snippet: gcloud app open-console --project {{PROJECT_ID}}

  - keyword: gaos;
    snippet: gcloud app open-console --project {{PROJECT_ID}} --service {{SERVICE}}

  - keyword: gsva;
    snippet: gcloud secrets versions access latest --project={{PROJECT_ID}} --secret={{SECRET_NAME}}

completions:
  - name: gcloud project
    patterns:
      - '^gcloud\b.*--project(?:=|\s+)[A-Za-z0-9._-]*$'
      - '^gcloud config set project'
    sourceCommand: "gcloud projects list --format='value(projectId)' 2>/dev/null"
    options:
      --prompt: "'GCP Project> '"

  - name: gcloud app service
    patterns:
      - '^gcloud\b.*--service(?:=|\s+)[A-Za-z0-9._-]*$'
    sourceCommand: "PROJECT=$(echo \"${LBUFFER}${RBUFFER}\" | perl -ne 'print $1 if /--project[=\\s]+(\\S+)/'); [ -n \"$PROJECT\" ] && gcloud app services list --format='value(id)' --project=\"$PROJECT\" 2>/dev/null"
    options:
      --prompt: "'App Service> '"

  - name: gcloud account
    patterns:
      - '^gcloud config set account'
    sourceCommand: "gcloud auth list --format='value(account)' 2>/dev/null"
    options:
      --prompt: "'GCP Account> '"

  - name: gcloud config property
    patterns:
      - '^gcloud config (set|unset)\s+[A-Za-z0-9./_-]*$'
    sourceCommand: "gcloud topic configurations 2>/dev/null | perl -pe 's/\\e\\[[0-9;]*m//g' | perl -ne 'if (/^     (\\w[\\w_]*)\\s*$/) { $s=$1 } elsif (/^         (\\w[\\w_]*)\\s*$/) { print $s eq \"core\" ? \"$1\\n\" : \"$s/$1\\n\" }'"
    options:
      --prompt: "'GCP Config Property> '"

  - name: gcloud secret
    patterns:
      - '^gcloud\b.*--secret(?:=|\s+)[A-Za-z0-9._-]*$'
      - '^gcloud secrets\b.*[^-\s][A-Za-z0-9._-]*$'
    sourceCommand: "PROJECT=$(echo \"${LBUFFER}${RBUFFER}\" | perl -ne 'print $1 if /--project[=\\s]+([A-Za-z0-9][A-Za-z0-9._:-]*)/'); { [ -n \"$PROJECT\" ] && gcloud secrets list --format='value(name)' --project=\"$PROJECT\" 2>/dev/null || gcloud secrets list --format='value(name)' 2>/dev/null; }"
    options:
      --prompt: "'GCP Secret> '"
