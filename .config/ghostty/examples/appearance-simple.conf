# =============================================================================
# Ghostty 見た目カスタマイズ（シンプル版）
#
# 分割された設定ファイル群から「見た目」に関わる項目だけを抜き出した最小構成。
# 値は現在の設定と同じにしてあるので、これ単体でも同じ見た目になります。
#
# 使い方（どちらか）:
#   A. この内容を ~/.config/ghostty/config に貼り付ける
#   B. お試し起動: ghostty --config-file=~/.config/ghostty/examples/appearance-simple.conf
# 反映: Ghostty は起動時に設定を読む。起動中は cmd+shift+, で再読み込み
# =============================================================================

# -----------------------------------------------------------------------------
# テーマ: OS のライト/ダークモードに追従して切り替わる
# 利用できるテーマ名の一覧は `ghostty +list-themes` で確認できる
# -----------------------------------------------------------------------------
theme = "light:iTerm2 Solarized Light, dark:Solarized Dark Patched"

# -----------------------------------------------------------------------------
# フォント
# -----------------------------------------------------------------------------
font-family = "HackGen Console NF"
font-size = 13

# -----------------------------------------------------------------------------
# 背景の透過とぼかし
# opacity: 1.0 で不透過、下げるほど透ける / blur: すりガラスのぼかし強さ
# -----------------------------------------------------------------------------
background-opacity = 0.7
background-blur = 13

# 非フォーカスの分割ペインを薄暗くする（アクティブなペインが分かりやすい）
unfocused-split-opacity = 0.7

# -----------------------------------------------------------------------------
# カーソル
# bar（縦棒） / block（四角） / underline（下線）から選べる
# -----------------------------------------------------------------------------
cursor-style = bar

# -----------------------------------------------------------------------------
# ウィンドウ
# -----------------------------------------------------------------------------
# 端の余白（ピクセル）。balance = true で左右上下を均等にする
window-padding-x = 2
window-padding-y = 2
window-padding-balance = true

# macOS: タブをタイトルバーに統合する（tabs / native / transparent / hidden）
macos-titlebar-style = tabs
